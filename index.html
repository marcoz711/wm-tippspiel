<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1226" />
  <title>WM-Tippspiel 2026 🏆</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <h1 id="app-title">🏆 WM-Tippspiel 2026</h1>
      <div class="header-actions">
        <button id="lang-toggle" class="chip-btn" title="Sprache / Language">DE</button>
        <button id="player-chip" class="chip-btn player-chip" title="Spieler wechseln">⚽</button>
      </div>
    </div>
  </header>

  <main id="view" class="view"></main>

  <nav class="tabbar" id="tabbar">
    <button class="tab active" data-tab="matches"><span class="tab-icon">⚽</span><span class="tab-label" data-i18n="tabMatches">Spiele</span></button>
    <button class="tab" data-tab="table"><span class="tab-icon">🏆</span><span class="tab-label" data-i18n="tabTable">Rangliste</span></button>
    <button class="tab" data-tab="favorites"><span class="tab-icon">🌍</span><span class="tab-label" data-i18n="tabFavorites">Teams</span></button>
    <button class="tab" data-tab="bonus"><span class="tab-icon">⭐</span><span class="tab-label" data-i18n="tabBonus">Bonus</span></button>
  </nav>

  <div id="overlay" class="overlay hidden"></div>
  <div id="toast" class="toast hidden"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
